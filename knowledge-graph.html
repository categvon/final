<script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>

<div id="cy" style="width:100%; height:600px;"></div>

<script>

fetch("graph.json")
.then(response => response.json())
.then(data => {

var cy = cytoscape({
  container: document.getElementById('cy'),

  elements: data,

  layout: { name: 'cose' },

  style: [
    {
      selector: 'node',
      style: {
        'label': 'data(id)',
        'font-size': 10
      }
    },
    {
      selector: 'edge',
      style: {
        'label': 'data(label)',
        'font-size': 8
      }
    }
  ]

});

});

</script>
